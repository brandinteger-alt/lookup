<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Lookup — Brand Integer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #faf7f2; --warm: #f3ede3; --gold: #b8963e; --gold-l: #d4af5a;
    --gold-dim: rgba(184,150,62,0.12); --charcoal: #1c1a18; --mid: #4a4540;
    --muted: #8c8480; --border: #e0d8cc;
    --green: #2d6a4f; --green-bg: rgba(216,243,220,0.4);
    --red: #b03030; --red-bg: #fbe8e8; --blue: #1a5276;
  }
  body { background: var(--cream); color: var(--charcoal); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 2rem 1rem 5rem; }

  .header { text-align: center; margin-bottom: 2.5rem; animation: fadeDown .6s ease both; }
  .eyebrow { font-size: .6rem; letter-spacing: .3em; text-transform: uppercase; color: var(--gold); margin-bottom: .4rem; }
  .header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.9rem,5vw,3rem); font-weight: 300; letter-spacing: .02em; }
  .header h1 em { font-style: italic; color: var(--gold); }
  .sub { margin-top: .4rem; font-size: .65rem; color: var(--muted); letter-spacing: .08em; }


  .card { max-width: 820px; margin: 0 auto 1.2rem; background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 1.6rem; animation: fadeUp .5s .15s ease both; }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; color: var(--charcoal); margin-bottom: 1rem; display: flex; align-items: center; gap: .6rem; }
  .card-title .num { font-family: 'DM Mono', monospace; font-size: .58rem; background: var(--gold); color: #fff; padding: 2px 7px; border-radius: 2px; }

  .ids-area { width: 100%; min-height: 100px; background: var(--warm); border: 1px solid var(--border); border-radius: 3px; padding: .75rem .9rem; font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--charcoal); resize: vertical; outline: none; transition: border-color .2s, box-shadow .2s; line-height: 1.7; }
  .ids-area:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
  .ids-area::placeholder { color: var(--muted); font-size: .66rem; }
  .ids-meta { display: flex; justify-content: space-between; align-items: center; margin-top: .5rem; }
  .ids-count { font-size: .62rem; color: var(--muted); }
  .ids-count span { color: var(--gold); font-weight: 500; }
  .btn-clear { font-family: 'DM Mono', monospace; font-size: .6rem; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 2px; padding: 3px 10px; cursor: pointer; transition: color .2s, border-color .2s; }
  .btn-clear:hover { color: var(--red); border-color: var(--red); }

  .run-row { display: flex; justify-content: center; margin: .2rem 0 1.4rem; }
  .btn-run { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; letter-spacing: .1em; color: #fff; background: var(--charcoal); border: none; border-radius: 3px; padding: .75rem 3.5rem; cursor: pointer; position: relative; overflow: hidden; transition: transform .15s; }
  .btn-run::after { content: ''; position: absolute; inset: 0; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform .3s ease; z-index: 0; }
  .btn-run:hover::after { transform: scaleX(1); }
  .btn-run span { position: relative; z-index: 1; }
  .btn-run:active { transform: scale(.97); }
  .btn-run:disabled { opacity: .5; cursor: not-allowed; }

  .prog-wrap { max-width: 820px; margin: 0 auto 1.2rem; display: none; }
  .prog-wrap.active { display: block; }
  .prog-track { background: var(--warm); border: 1px solid var(--border); border-radius: 3px; height: 4px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-l)); width: 0%; transition: width .4s; border-radius: 3px; }
  .prog-label { font-size: .6rem; color: var(--muted); margin-top: .4rem; text-align: center; }

  #resultsSection { max-width: 820px; margin: 0 auto; }
  .results-card { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 1.4rem; animation: fadeUp .4s ease both; }
  .results-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .6rem; margin-bottom: 1rem; }
  .results-title { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; }
  .results-meta { display: flex; align-items: center; gap: .8rem; flex-wrap: wrap; }
  .stat { font-size: .62rem; color: var(--muted); }
  .stat .hit { color: var(--green); font-weight: 500; }
  .stat .miss { color: var(--red); font-weight: 500; }
  .btn-export { font-family: 'DM Mono', monospace; font-size: .62rem; letter-spacing: .04em; color: var(--charcoal); background: var(--warm); border: 1px solid var(--border); border-radius: 2px; padding: 4px 13px; cursor: pointer; transition: border-color .2s, color .2s; }
  .btn-export:hover { border-color: var(--gold); color: var(--gold); }

  .order-list { display: flex; flex-direction: column; gap: .6rem; }
  .order-item { border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .order-item.found { border-left: 3px solid var(--green); }
  .order-item.not-found { border-left: 3px solid var(--red); opacity: .6; }
  .order-header { display: flex; align-items: center; gap: .7rem; padding: .55rem .9rem; background: var(--warm); flex-wrap: wrap; }
  .order-id { font-size: .75rem; font-weight: 500; color: var(--charcoal); }
  .badge { font-size: .56rem; padding: 2px 8px; border-radius: 20px; font-weight: 500; letter-spacing: .05em; }
  .badge.found { background: var(--green-bg); color: var(--green); border: 1px solid #b7dfca; }
  .badge.not-found { background: var(--red-bg); color: var(--red); border: 1px solid #e8c5c5; }

  .order-fields { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); }
  .field { padding: .4rem .55rem; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .field:nth-child(even) { background: var(--cream); }
  .field-key { font-size: .54rem; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-bottom: .2rem; }
  .field-val { font-size: .69rem; color: var(--charcoal); word-break: break-word; }
  .field-val a { color: var(--blue); text-decoration: none; font-size: .62rem; }
  .field-val a:hover { text-decoration: underline; }
  .nf-msg { padding: .6rem .9rem; font-size: .68rem; color: var(--muted); font-style: italic; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:none; } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(12px);  } to { opacity:1; transform:none; } }
  @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:.3; } }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">Brand Integer · Internal Tool</div>
  <h1>Order <em>Lookup</em> Portal</h1>
  <div class="sub">Searches across all 5 form response sheets instantly</div>
</div>


<div class="card">
  <div class="card-title"><span class="num">01</span> Paste Order IDs</div>
  <div style="font-size:.63rem;color:var(--muted);margin-bottom:.7rem;line-height:1.7;">
    One per line, comma-separated, or tab-separated. Unlimited. Duplicates removed automatically.
  </div>
  <textarea class="ids-area" id="orderIds" placeholder="403-3772919-9396337&#10;OD336296597207031100&#10;NYK-329558304-5147502"></textarea>
  <div class="ids-meta">
    <div class="ids-count" id="idsCount"><span>0</span> IDs entered</div>
    <button class="btn-clear" onclick="clearIds()">Clear</button>
  </div>
</div>

<div class="run-row">
  <button class="btn-run" id="runBtn" onclick="runLookup()">
    <span id="runLabel">⟶ Run Lookup</span>
  </button>
</div>

<div class="prog-wrap" id="progWrap">
  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  <div class="prog-label" id="progLabel">Starting…</div>
</div>

<div id="resultsSection"></div>

<script>
const SHEETS = [
  { label: "Jan'26",  id: '14fgv6AZJQ-ojuke1Fn9KojEO7p3Q1MIk3cnusOuUhcI', tab: "Jan'26 Form Responses" },
  { label: "Feb'26",  id: '1faCJv1lPRT7sNE_isQoeuT8JpsLiwyxRTIMjbiYx85Q', tab: "Feb'26 Form Responses" },
  { label: "Sheet 3", id: '1Ia9WB-T4zMGCyxwrjfGajdHeW9jQmHzTftdyHFS3QI8', tab: 'Sheet1' },
  { label: "Sheet 4", id: '1r35XOkduDE6wqXBvC93yeOwpnllMMmxAWKXDFKU3cS8', tab: 'Sheet1' },
  { label: "Sheet 5", id: '1F7Cl3M5eHAOj-CuBU_f_OvhcFVqAKgb82_g7nFsDlT8', tab: 'Sheet1' },
];

// Curated display columns (0-indexed). Col E (idx 4) = Order ID.
const DISPLAY_COLS = [
  { key: 'Order Date',       idx: 2  },
  { key: 'Reviewer Name',    idx: 3  },
  { key: 'Order ID',         idx: 4  },
  { key: 'Order Amount',     idx: 9  },
  { key: 'Deliverable',      idx: 11 },
  { key: 'WhatsApp No',      idx: 15 },
  { key: 'Mediator',         idx: 16 },
  { key: 'Mediator Less',    idx: 17 },
  { key: 'Refund Amt',       idx: 18 },
  { key: 'Product Ordered',  idx: 19 },
  { key: 'Refund Form Date', idx: 20 },
  { key: 'Review Link',      idx: 21 },
  { key: 'UPI / GPay',       idx: 26 },
];

const ORDER_ID_COL = 4;

// Build pills


// ID parsing
function parseIds(raw) {
  return [...new Set(raw.split(/[\n,\t]+/).map(s => s.trim()).filter(Boolean))];
}
function updateCount() {
  const n = parseIds(document.getElementById('orderIds').value).length;
  document.getElementById('idsCount').innerHTML = `<span>${n}</span> unique ID${n!==1?'s':''} entered`;
}
function clearIds() { document.getElementById('orderIds').value=''; updateCount(); }

// CSV fetch
async function fetchSheet(sheet) {
  const url = `https://docs.google.com/spreadsheets/d/${sheet.id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet.tab)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return parseCSV(await r.text());
}

function parseCSV(text) {
  const rows = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const cols=[]; let cur='', inQ=false;
    for (let i=0;i<line.length;i++) {
      const c=line[i];
      if (c==='"') { inQ=!inQ; continue; }
      if (c===','&&!inQ) { cols.push(cur.trim()); cur=''; continue; }
      cur+=c;
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

function setProgress(pct, label) {
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progLabel').textContent = label;
}

// Main lookup
async function runLookup() {
  const ids = parseIds(document.getElementById('orderIds').value);
  if (!ids.length) { alert('Please paste at least one Order ID.'); return; }

  const btn=document.getElementById('runBtn'), lbl=document.getElementById('runLabel');
  btn.disabled=true; lbl.textContent='Fetching…';
  const progWrap=document.getElementById('progWrap');
  progWrap.classList.add('active');
  setProgress(0,'Starting…');
  document.getElementById('resultsSection').innerHTML='';

  const resultMap={};
  ids.forEach(id => resultMap[id]={found:false});

  for (let si=0; si<SHEETS.length; si++) {
    const sheet=SHEETS[si];
    setProgress(Math.round((si/SHEETS.length)*90), `Loading ${sheet.label}…`);
    try {
      const rows=await fetchSheet(sheet);
      const data=rows.slice(1).filter(r=>r.some(c=>c&&c.trim()));
      for (const id of ids) {
        if (resultMap[id].found) continue;
        const row=data.find(r=>r[ORDER_ID_COL]&&r[ORDER_ID_COL].toLowerCase()===id.toLowerCase());
        if (row) resultMap[id]={found:true, sheetLabel:sheet.label, rowData:row};
      }
    } catch(e) {
      console.warn(sheet.label, e.message);
    }
  }

  setProgress(100,'Done');
  setTimeout(()=>progWrap.classList.remove('active'),900);
  btn.disabled=false; lbl.textContent='⟶ Run Lookup';
  renderResults(ids, resultMap);
}

function renderResults(ids, resultMap) {
  const sec=document.getElementById('resultsSection');
  const foundCount=ids.filter(id=>resultMap[id].found).length;
  const notFound=ids.filter(id=>!resultMap[id].found);
  const sorted=[...ids.filter(id=>resultMap[id].found),...notFound];

  let html=`
    <div class="results-card">
      <div class="results-header">
        <div class="results-title">Results</div>
        <div class="results-meta">
          <div class="stat">
            <span class="hit">${foundCount} found</span> &nbsp;·&nbsp;
            <span class="miss">${notFound.length} not found</span> &nbsp;·&nbsp;
            ${ids.length} searched
          </div>
          <button class="btn-export" onclick="exportCSV()">↓ Export CSV</button>
        </div>
      </div>
      <div class="order-list">`;

  for (const id of sorted) {
    const r=resultMap[id];
    if (r.found) {
      html+=`<div class="order-item found">
        <div class="order-header">
          <div class="order-id">${esc(id)}</div>
          <span class="badge found">Found</span>
        </div>
        <div class="order-fields">`;
      for (const col of DISPLAY_COLS) {
        const val=(r.rowData[col.idx]||'').trim();
        if (!val||val==='—') continue;
        const display=isLink(val)?`<a href="${esc(val)}" target="_blank">🔗 Open</a>`:esc(val);
        html+=`<div class="field"><div class="field-key">${esc(col.key)}</div><div class="field-val">${display}</div></div>`;
      }
      html+=`</div></div>`;
    } else {
      html+=`<div class="order-item not-found">
        <div class="order-header">
          <div class="order-id">${esc(id)}</div>
          <span class="badge not-found">Not Found</span>
        </div>
        <div class="nf-msg">No matching entry across all 5 sheets.</div>
      </div>`;
    }
  }

  html+=`</div></div>`;
  sec.innerHTML=html;
  window._exportData={ids,resultMap};
}

function isLink(v){return v.startsWith('http://')||v.startsWith('https://');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function exportCSV(){
  if(!window._exportData)return;
  const{ids,resultMap}=window._exportData;
  const header=DISPLAY_COLS.map(c=>c.key);
  const rows=ids
    .filter(id=>resultMap[id].found)
    .map(id=>DISPLAY_COLS.map(c=>csvQ(resultMap[id].rowData[c.idx]||'')));
  const csv=[header,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`orders_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
function csvQ(v){v=String(v);return(v.includes(',')||v.includes('"')||v.includes('\n'))?`"${v.replace(/"/g,'""')}"`:v;}

document.getElementById('orderIds').addEventListener('input',updateCount);
</script>
</body>
</html>
